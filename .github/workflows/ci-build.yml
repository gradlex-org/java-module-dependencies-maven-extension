name: Build Extension
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  MAVEN_HOME: "/usr/share/apache-maven-3.9.11"
jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: git clone gradlex-build-conventions
        uses: actions/checkout@v5
        with:
          repository: gradlex-org/plugin-publish-conventions
          path: build/plugin-publish-conventions
          ref: new-convention-plugins
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v5
      - run: "./gradlew build -Psigning.disable"